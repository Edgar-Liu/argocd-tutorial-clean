apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  annotations:
    argocd.argoproj.io/sync-wave: "0"
data:
  DB_HOST: "postgres.database.svc.cluster.local"
  DB_PORT: "5432"
  APP_ENV: "production"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  annotations:
    argocd.argoproj.io/sync-wave: "0"
type: Opaque
stringData:
  DB_PASSWORD: "tutorial-password-123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wave-app
  labels:
    app: wave-app
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wave-app
  template:
    metadata:
      labels:
        app: wave-app
    spec:
      containers:
      - name: wave-app
        image: DOCKERHUB_USERNAME/demo-app:v1
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: app-secret
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wave-app
  labels:
    app: wave-app
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: wave-app
