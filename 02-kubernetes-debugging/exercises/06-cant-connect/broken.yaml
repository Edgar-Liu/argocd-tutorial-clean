apiVersion: apps/v1
kind: Deployment
metadata:
  name: misconfig-app
  labels:
    app: misconfig-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: misconfig-app
  template:
    metadata:
      labels:
        app: misconfig-app
        version: v1
    spec:
      containers:
      - name: misconfig-app
        image: edgarbun/demo-app:v1
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: misconfig-app
  labels:
    app: misconfig-app
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: misconfig-web
    version: v2
