name: CI/CD Pipeline (Docker Hub)

on:
  push:
    branches:
      - OliverTeo288  # Updated by setup: sed replaces with your branch name

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Get Docker Hub repo from deployment
      id: get-repo
      run: |
        DOCKER_IMAGE=$(grep 'image:' 01-gitops-basics/k8s/base/deployment.yaml | awk '{print $2}' | cut -d':' -f1)
        echo "repo=$DOCKER_IMAGE" >> $GITHUB_OUTPUT
        echo "Docker image: $DOCKER_IMAGE"
    
    - name: Generate image tag
      id: image-tag
      run: |
        SHORT_SHA=$(git rev-parse --short HEAD)
        echo "tag=$SHORT_SHA" >> $GITHUB_OUTPUT
        echo "Image tag: $SHORT_SHA"
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: oliverteo
        password: ${{ secrets.DOCKERHUB_TOKEN_OLIVERTEO288 }}
    
    - name: Build and push to Docker Hub
      env:
        DOCKER_REPO: ${{ steps.get-repo.outputs.repo }}
        IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
      run: |
        cd 01-gitops-basics/app
        docker buildx build --platform linux/amd64 \
          -t $DOCKER_REPO:$IMAGE_TAG \
          --push .
        echo "IMAGE_FULL_PATH=$DOCKER_REPO:$IMAGE_TAG" >> $GITHUB_ENV
    
    - name: Update Kubernetes manifest
      env:
        IMAGE_TAG: ${{ steps.image-tag.outputs.tag }}
      run: |
        sed -i "s|image:.*|image: $IMAGE_FULL_PATH|" 01-gitops-basics/k8s/base/deployment.yaml
        sed -i "s|value: \".*\" # IMAGE_TAG|value: \"$IMAGE_TAG\" # IMAGE_TAG|" 01-gitops-basics/k8s/base/deployment.yaml
        cat 01-gitops-basics/k8s/base/deployment.yaml | grep -E "image:|IMAGE_TAG"
    
    - name: Commit and push manifest changes
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add 01-gitops-basics/k8s/base/deployment.yaml
        git diff --staged --quiet || git commit -m "chore: update image tag to ${{ steps.image-tag.outputs.tag }} [skip ci]"
        git pull --rebase origin ${{ github.ref_name }}
        git push
